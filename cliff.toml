[changelog]
header = """
# Changelog

All notable changes to GraphitePDF are documented here.\
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\
\n### {{ group | upper_first }}\n
{% for commit in commits %}\
- {% if commit.breaking %}⚠ **BREAKING** {% endif %}\
{% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
{{ commit.message | upper_first }} \
([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/admirsaheta/graphitepdf/commit/{{ commit.id }}))\
{% if commit.breaking %}\n\n  > {{ commit.breaking_description }}\n{% endif %}\n
{% endfor %}\
{% endfor %}\n
"""
trim = true
footer = """
---
*Generated by [git-cliff](https://github.com/orhun/git-cliff)*\
"""
postprocessors = [
  { pattern = "<REPO>", replace = "https://github.com/admirsaheta/graphitepdf" },
]

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_preprocessors = [
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/admirsaheta/graphitepdf/issues/${2}))" },
]
commit_parsers = [
  { message = "^feat",             group = "Features" },
  { message = "^fix",              group = "Bug Fixes" },
  { message = "^perf",             group = "Performance" },
  { message = "^refactor",         group = "Refactoring" },
  { message = "^docs",             group = "Documentation" },
  { message = "^style",            group = "Styling" },
  { message = "^test",             group = "Testing" },
  { message = "^ci",               group = "CI/CD" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore",            group = "Miscellaneous" },
  { message = "^revert",           group = "Reverts" },
  { body = ".*security",           group = "Security" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
date_order = false
sort_commits = "oldest"
link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/admirsaheta/graphitepdf/issues/$1" },
]
