# cargo-release workspace configuration
# https://github.com/crate-ci/cargo-release/blob/master/docs/reference.md
#
# Publish order is handled explicitly in .github/workflows/release.yml.
# This file only controls commit/tag/push behaviour and excludes non-library crates.

sign-commit = false
sign-tag    = false
push        = true
publish     = true
tag         = true

shared-version = true

pre-release-commit-message = "chore(release): v{{version}} [skip ci]"
tag-name    = "v{{version}}"
tag-message = "GraphitePDF v{{version}}"
push-remote = "origin"

# The docs Yew app is not a library — never publish or tag it
[packages.docs]
publish = false
tag     = false
