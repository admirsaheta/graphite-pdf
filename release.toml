# cargo-release workspace configuration
# https://github.com/crate-ci/cargo-release/blob/master/docs/reference.md
#
# Per-package overrides go in each package's Cargo.toml under [package.metadata.release].
# Publish order is handled explicitly in .github/workflows/release.yml.

sign-commit = false
sign-tag    = false
push        = true
publish     = true
tag         = true
shared-version = true

pre-release-commit-message = "chore(release): v{{version}} [skip ci]"
tag-name    = "v{{version}}"
tag-message = "GraphitePDF v{{version}}"
push-remote = "origin"
